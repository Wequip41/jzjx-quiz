<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>机械制造装备设计 · 刷题系统</title>
<style>
:root{
  --bg:#0b0e14;--bg2:#151923;--bg3:#1e2332;--bg4:#283046;
  --accent:#6c8cff;--accent2:#ff6b9d;--green:#4ade80;--red:#f87171;
  --yellow:#fbbf24;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:14px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#app{max-width:520px;margin:0 auto;padding:0 16px 100px}

.header{padding:18px 0 10px;text-align:center}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:12px;color:var(--text3);margin-top:2px}

.screen{display:none;animation:fadeIn .3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
.mode-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:20px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.mode-card:active{transform:scale(.96)}
.mode-card .icon{font-size:28px;margin-bottom:8px;display:block}
.mode-card .title{font-size:15px;font-weight:600;margin-bottom:3px}
.mode-card .desc{font-size:11px;color:var(--text2);line-height:1.5}
.mode-card::after{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:.05;transition:all .3s}
.mode-card:nth-child(1)::after{background:var(--accent)}
.mode-card:nth-child(2)::after{background:var(--accent2)}
.mode-card:nth-child(3)::after{background:var(--yellow)}
.mode-card:nth-child(4)::after{background:var(--green)}

.stats-bar{display:flex;gap:8px;margin:14px 0}
.stat-item{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;border:1px solid var(--bg3)}
.stat-item .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-item .label{font-size:10px;color:var(--text3);margin-top:2px}

.cat-tabs{display:flex;gap:6px;margin:12px 0 8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:7px 14px;border-radius:18px;font-size:12px;white-space:nowrap;cursor:pointer;background:var(--bg3);color:var(--text2);border:none;transition:all .15s;flex-shrink:0}
.cat-tab.active{background:var(--accent);color:#fff;font-weight:600}

.quiz-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:18px;margin:10px 0;position:relative;animation:popIn .25s ease}
.quiz-card .q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.quiz-card .q-num{font-size:11px;color:var(--accent);font-weight:600}
.quiz-card .q-cat{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 10px;border-radius:10px}
.quiz-card .q-text{font-size:14px;line-height:1.8;margin-bottom:12px;color:var(--text)}
.quiz-card .q-images{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;justify-content:center}
.quiz-card .q-images img{max-width:100%;max-height:280px;border-radius:8px;cursor:pointer;border:1px solid var(--bg3);transition:transform .2s;background:var(--bg4)}
.quiz-card .q-images img:hover{transform:scale(1.02);border-color:var(--accent)}

.star-btn{position:absolute;top:14px;right:14px;font-size:20px;cursor:pointer;color:var(--text3);transition:all .2s;z-index:2;background:none;border:none;line-height:1}
.star-btn.active{color:var(--yellow);animation:popIn .3s ease}

.options-list{display:flex;flex-direction:column;gap:8px}
.option-btn{display:block;width:100%;text-align:left;padding:13px 14px;border-radius:var(--radius-sm);border:2px solid var(--bg3);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;line-height:1.5}
.option-btn:active{transform:scale(.98)}
.option-btn.correct{border-color:var(--green);background:rgba(74,222,128,.12);color:var(--green)}
.option-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.12);color:var(--red);animation:shake .4s}
.option-btn:disabled{cursor:default;opacity:.85}

.tf-group{display:flex;gap:10px}
.tf-btn{flex:1;padding:16px;border-radius:var(--radius-sm);border:2px solid var(--bg4);background:var(--bg4);font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;color:#fff}
.tf-btn:active{transform:scale(.96)}
.tf-btn.correct{border-color:var(--green);background:rgba(74,222,128,.2);color:var(--green)}
.tf-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.2);color:var(--red)}
.tf-btn:disabled{cursor:default;opacity:.9}

.answer-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:2px solid var(--bg3);background:var(--bg4);color:var(--text);font-size:13px;resize:vertical;min-height:56px;font-family:inherit;transition:border-color .2s;line-height:1.6}
.answer-input:focus{outline:none;border-color:var(--accent)}

.answer-box{margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:var(--radius-sm);border-left:3px solid var(--accent);display:none}
.answer-box.show{display:block;animation:fadeIn .25s ease}
.answer-box .ans-label{font-size:10px;color:var(--accent);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.answer-box .ans-text{font-size:13px;line-height:1.8;color:var(--text)}

.self-check{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

.btn{padding:9px 18px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:2px solid var(--bg3);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 12px}
.btn-green{background:var(--green);color:#0b0e14}
.btn-red{background:transparent;border:2px solid var(--red);color:var(--red)}

.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;padding:4px 0 env(safe-area-inset-bottom);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:none;font-size:10px;gap:2px}
.nav-item .nav-icon{font-size:18px}
.nav-item.active{color:var(--accent)}
.nav-item:active{transform:scale(.9)}

.progress-bar{height:3px;background:var(--bg3);border-radius:2px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s ease}
.progress-text{font-size:11px;color:var(--text3);text-align:center}

.settings-panel{background:var(--bg2);border-radius:var(--radius);padding:18px;margin:14px 0;border:1px solid var(--bg3);text-align:center}
.settings-panel label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px}
.settings-panel .range-val{font-size:32px;font-weight:700;color:var(--accent);margin:6px 0}
.settings-panel input[type="range"]{width:100%;accent-color:var(--accent);margin:8px 0}
.settings-panel .btn{width:100%;margin-top:10px;padding:12px;font-size:14px}

.cat-checks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0}
.cat-check{padding:6px 12px;border-radius:16px;font-size:11px;cursor:pointer;background:var(--bg3);color:var(--text2);border:2px solid transparent;transition:all .15s;user-select:none}
.cat-check.active{background:rgba(108,140,255,.15);border-color:var(--accent);color:var(--accent);font-weight:600}
.cat-check:active{transform:scale(.94)}

.num-input{width:100%;padding:10px 14px;border-radius:10px;border:2px solid var(--bg3);background:var(--bg4);color:var(--accent);font-size:20px;font-weight:700;text-align:center;font-family:inherit;transition:border-color .2s}
.num-input:focus{outline:none;border-color:var(--accent)}

.empty-state{text-align:center;padding:50px 16px;color:var(--text3)}
.empty-state .empty-icon{font-size:44px;margin-bottom:12px}
.empty-state p{font-size:13px;margin-bottom:4px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--text);padding:10px 20px;border-radius:18px;font-size:12px;z-index:200;box-shadow:var(--shadow);animation:popIn .3s ease;pointer-events:none;white-space:nowrap}

.cat-blocks{display:flex;flex-direction:column;gap:10px;margin:8px 0}
.cat-block{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .2s}
.cat-block:active{transform:scale(.97)}
.cat-block:hover{border-color:var(--accent)}
.cat-block .cb-icon{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.cat-block .cb-info{flex:1;min-width:0}
.cat-block .cb-name{font-size:15px;font-weight:600;margin-bottom:4px}
.cat-block .cb-progress{display:flex;align-items:center;gap:8px}
.cat-block .cb-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.cat-block .cb-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}
.cat-block .cb-pct{font-size:11px;color:var(--text2);white-space:nowrap}

.acc-bar{display:flex;gap:10px;margin:6px 0 10px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--bg3);font-size:11px;align-items:center;flex-wrap:wrap}
.acc-bar .acc-item{display:flex;align-items:center;gap:3px;white-space:nowrap}
.acc-bar .acc-val{font-weight:700;font-size:14px}
.acc-bar .acc-label{color:var(--text3)}
.acc-bar .acc-div{width:1px;height:18px;background:var(--bg3)}
.acc-c{color:var(--green)}.acc-w{color:var(--red)}.acc-r{color:var(--accent)}

.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;padding-top:4px}
.nav-row .back-btn{font-size:18px;cursor:pointer;background:none;border:none;color:var(--text2);padding:4px 8px}
.nav-row .mode-title{font-weight:600;font-size:15px}
.nav-bottom-btns{display:flex;gap:10px;justify-content:center;margin-top:14px;padding-bottom:8px}

.no-select{-webkit-user-select:none;user-select:none}

.img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-lightbox img{max-width:95%;max-height:95%;border-radius:8px;animation:popIn .2s ease}
</style>
</head>
<body>
<div id="app">
  <div class="header no-select">
    <h1>🔧 机械制造装备设计 · 刷题系统</h1>
    <div class="sub">第1-3章 — 填空·选择·判断 — 145题</div>
  </div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-grid">
      <div class="mode-card" onclick="startSequential()"><span class="icon">📋</span><div class="title">顺序刷题</div><div class="desc">按分类逐题练习</div></div>
      <div class="mode-card" onclick="startRandom()"><span class="icon">🎲</span><div class="title">随机刷题</div><div class="desc">抽题实战检验</div></div>
      <div class="mode-card" onclick="startWrongBook()"><span class="icon">📕</span><div class="title">错题本</div><div class="desc">收录错题复习</div></div>
      <div class="mode-card" onclick="startViewMode()"><span class="icon">👁️</span><div class="title">看题模式</div><div class="desc">直接查看答案</div></div>
    </div>
    <div class="stats-bar">
      <div class="stat-item"><div class="num" id="stat-total">145</div><div class="label">总题数</div></div>
      <div class="stat-item"><div class="num" id="stat-wrong">0</div><div class="label">错题</div></div>
      <div class="stat-item"><div class="num" id="stat-fav">0</div><div class="label">收藏</div></div>
    </div>
  </div>

  <!-- SEQUENTIAL CATEGORY OVERVIEW -->
  <div id="screen-seq-cats" class="screen">
    <div class="nav-row"><button class="back-btn" onclick="goHome()">←</button><span class="mode-title">顺序刷题 · 选择分类</span></div>
    <div class="cat-blocks" id="seq-blocks"></div>
  </div>

  <!-- SEQUENTIAL QUIZ -->
  <div id="screen-sequential" class="screen">
    <div class="nav-row"><button class="back-btn" onclick="seqBackToCats()">←</button><span class="mode-title" id="seq-title">顺序刷题</span></div>
    <div class="acc-bar" id="seq-acc">
      <span class="acc-item"><span class="acc-val acc-c" id="seq-ok">0</span><span class="acc-label">✓正确</span></span>
      <span class="acc-div"></span>
      <span class="acc-item"><span class="acc-val acc-w" id="seq-ng">0</span><span class="acc-label">✗错误</span></span>
      <span class="acc-div"></span>
      <span class="acc-item"><span class="acc-val acc-r" id="seq-rate">-</span><span class="acc-label">正确率</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="seq-pb" style="width:0%"></div></div>
    <div class="progress-text" id="seq-pt"></div>
    <div id="seq-area"></div>
    <div class="nav-bottom-btns">
      <button class="btn btn-outline" id="seq-prev" onclick="seqMove(-1)">◀ 上一题</button>
      <button class="btn btn-primary" id="seq-next" onclick="seqMove(1)">下一题 ▶</button>
    </div>
  </div>

  <!-- RANDOM -->
  <div id="screen-random" class="screen">
    <div class="nav-row"><button class="back-btn" onclick="goHome()">←</button><span class="mode-title">随机刷题</span></div>
    <div id="rand-settings"></div>
    <div class="progress-bar"><div class="progress-fill" id="rand-pb" style="width:0%"></div></div>
    <div class="progress-text" id="rand-pt"></div>
    <div id="rand-area"></div>
    <div class="nav-bottom-btns"><button class="btn btn-primary" id="rand-next" onclick="randNext()">下一题 ▶</button></div>
  </div>

  <!-- WRONG BOOK -->
  <div id="screen-wrongbook" class="screen">
    <div class="nav-row"><button class="back-btn" onclick="goHome()">←</button><span class="mode-title">错题本 📕</span></div>
    <div class="progress-bar"><div class="progress-fill" id="wb-pb" style="width:0%"></div></div>
    <div class="progress-text" id="wb-pt"></div>
    <div id="wb-area"></div>
    <div class="nav-bottom-btns">
      <button class="btn btn-outline" id="wb-prev" onclick="wbMove(-1)">◀ 上一题</button>
      <button class="btn btn-primary" id="wb-next" onclick="wbMove(1)">下一题 ▶</button>
    </div>
  </div>

  <!-- VIEW MODE -->
  <div id="screen-viewmode" class="screen">
    <div class="nav-row"><button class="back-btn" onclick="goHome()">←</button><span class="mode-title">看题模式 👁️</span></div>
    <div class="cat-tabs" id="view-cats"></div>
    <div class="progress-bar"><div class="progress-fill" id="view-pb" style="width:0%"></div></div>
    <div class="progress-text" id="view-pt"></div>
    <div id="view-area"></div>
    <div class="nav-bottom-btns">
      <button class="btn btn-outline" id="view-prev" onclick="viewMove(-1)">◀ 上一题</button>
      <button class="btn btn-primary" id="view-next" onclick="viewMove(1)">下一题 ▶</button>
    </div>
  </div>

  <!-- FAVORITES -->
  <div id="screen-favorites" class="screen">
    <div class="nav-row"><span class="mode-title">⭐ 收藏夹</span></div>
    <div class="cat-tabs" id="fav-cats"></div>
    <div id="fav-area"></div>
  </div>

  <div class="nav-bar no-select">
    <button class="nav-item active" id="nav-home" onclick="goHome()"><span class="nav-icon">🏠</span>首页</button>
    <button class="nav-item" id="nav-fav" onclick="showFavorites()"><span class="nav-icon">⭐</span>收藏夹</button>
  </div>
</div>

<script>
// ============ DATA ============
const DB = __QUESTIONS_JSON__;

const K_WRONG='jzjx_wrong',K_FAV='jzjx_fav';
function ld(k){try{return new Set(JSON.parse(localStorage.getItem(k)||'[]'))}catch{return new Set()}}
function sv(k,s){localStorage.setItem(k,JSON.stringify([...s]))}
let wrongSet=ld(K_WRONG),favSet=ld(K_FAV);
let toastTimer=null;

function toast(m){
  const t=document.createElement('div');t.className='toast';t.textContent=m;
  document.body.appendChild(t);clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),1800);
}

function updateStats(){
  document.getElementById('stat-wrong').textContent=wrongSet.size;
  document.getElementById('stat-fav').textContent=favSet.size;
}

function qById(id){return DB.find(q=>q.id===id)}

// ============ SCREEN SWITCHING ============
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(id==='favorites')document.getElementById('nav-fav').classList.add('active');
  else document.getElementById('nav-home').classList.add('active');
}
function goHome(){switchScreen('home');updateStats()}

// ============ FAV TOGGLE ============
function toggleFav(qid,el){
  if(favSet.has(qid)){favSet.delete(qid);if(el)el.classList.remove('active')}
  else{favSet.add(qid);if(el){el.classList.add('active');el.style.animation='none';el.offsetHeight;el.style.animation='popIn .3s ease'}}
  sv(K_FAV,favSet);updateStats();
}
function isFav(qid){return favSet.has(qid)}

// ============ IMAGE LIGHTBOX ============
function showLightbox(src){
  const lb=document.createElement('div');lb.className='img-lightbox';
  lb.innerHTML='<img src="'+src+'">';
  lb.onclick=()=>lb.remove();
  document.body.appendChild(lb);
}

// ============ RENDER QUESTION ============
function renderQuiz(q,mode,answered,ua){
  const sf=isFav(q.id)?' active':'';
  let h='<div class="quiz-card">\n    <button class="star-btn'+sf+'" onclick="event.stopPropagation();toggleFav(\''+q.id+'\',this)">★</button>\n    <div class="q-header"><span class="q-num">#'+q.id+'</span><span class="q-cat">'+q.category+'</span></div>';
  
  if(q.images&&q.images.length){
    h+='<div class="q-images">';
    for(const img of q.images) h+='<img src="'+img+'" onclick="showLightbox(\''+img+'\')" loading="lazy">';
    h+='</div>';
  }
  
  h+='<div class="q-text">'+q.question.replace(/\[pic\]/g,'')+'</div>';

  if(q.type==='choice'){
    h+='<div class="options-list">';
    for(const o of q.options){
      let cls='option-btn';
      if(mode==='view' && o.label===q.answer){cls+=' correct'}
      else if(answered){
        if(o.label===q.answer)cls+=' correct';
        else if(o.label===ua&&ua!==q.answer)cls+=' wrong';
      }
      const dis=(answered||mode==='view')?' disabled':'';
      const clk=(mode!=='view')?'onclick="answerChoice(\''+q.id+'\',\''+o.label+'\',this)"':'';
      h+='<button class="'+cls+'"'+dis+' '+clk+'>'+o.label+'. '+o.text+'</button>';
    }
    h+='</div>';
  }else if(q.type==='true_false'){
    h+='<div class="tf-group">';
    for(const[v,l] of[['√','正确'],['×','错误']]){
      let cls='tf-btn';
      if(mode==='view' && v===q.answer){cls+=' correct'}
      else if(answered){
        if(v===q.answer)cls+=' correct';
        else if(v===ua&&ua!==q.answer)cls+=' wrong';
      }
      const dis=(answered||mode==='view')?' disabled':'';
      const clk=(mode!=='view')?'onclick="answerTF(\''+q.id+'\',\''+v+'\',this)"':'';
      h+='<button class="'+cls+'"'+dis+' '+clk+'>'+v+' '+l+'</button>';
    }
    h+='</div>';
  }else{
    if(mode!=='view'){
      h+='<textarea class="answer-input" placeholder="输入你的答案..." id="inp-'+q.id+'"></textarea>';
      h+='<div class="self-check">\n        <button class="btn btn-primary" onclick="revealAnswer(\''+q.id+'\')">💡 显示答案</button>\n        <button class="btn btn-green" id="btny-'+q.id+'" style="display:none" onclick="markOk(\''+q.id+'\')">✓ 我做对了</button>\n        <button class="btn btn-red" id="btnn-'+q.id+'" style="display:none" onclick="markBad(\''+q.id+'\')">✗ 我做错了</button>\n      </div>';
    }
    h+='<div class="answer-box'+(mode==='view'?' show':'')+'" id="ans-'+q.id+'">\n      <div class="ans-label">📝 参考答案</div>\n      <div class="ans-text">'+(q.answer||'暂无').replace(/\[pic\]/g,'')+'</div>\n      '+(q.answer_images&&q.answer_images.length?'<div class="q-images" style="margin-top:8px">'+q.answer_images.map(img=>'<img src="'+img+'" onclick="showLightbox(\''+img+'\')" loading="lazy">').join('')+'</div>':'')+'\n    </div>';
  }
  h+='</div>';
  return h;
}

// ============ ANSWERS ============
function answerChoice(qid,label,btn){
  const q=qById(qid),ok=label===q.answer;
  const p=btn.parentElement;
  p.querySelectorAll('.option-btn').forEach(b=>{b.disabled=true});
  p.querySelectorAll('.option-btn').forEach(b=>{if(b.textContent.trim().startsWith(q.answer+'.'))b.classList.add('correct')});
  if(!ok)btn.classList.add('wrong');
  if(!ok)wrongSet.add(qid);else wrongSet.delete(qid);
  sv(K_WRONG,wrongSet);updateStats();
  if(document.getElementById('screen-sequential').classList.contains('active')){
    if(ok)seq.ok++;else seq.ng++;updateSeqAcc();
  }
}

function answerTF(qid,label,btn){
  const q=qById(qid),ok=label===q.answer;
  const p=btn.parentElement;
  p.querySelectorAll('.tf-btn').forEach(b=>{b.disabled=true});
  p.querySelectorAll('.tf-btn').forEach(b=>{if(b.textContent.trim().startsWith(q.answer))b.classList.add('correct')});
  if(!ok)btn.classList.add('wrong');
  if(!ok)wrongSet.add(qid);else wrongSet.delete(qid);
  sv(K_WRONG,wrongSet);updateStats();
  if(document.getElementById('screen-sequential').classList.contains('active')){
    if(ok)seq.ok++;else seq.ng++;updateSeqAcc();
  }
}

function revealAnswer(qid){
  document.getElementById('ans-'+qid).classList.add('show');
  document.getElementById('btny-'+qid).style.display='inline-block';
  document.getElementById('btnn-'+qid).style.display='inline-block';
}
function markOk(qid){wrongSet.delete(qid);sv(K_WRONG,wrongSet);updateStats();toast('已标记为正确 ✓');
  if(document.getElementById('screen-sequential').classList.contains('active')){seq.ok++;updateSeqAcc();}
}
function markBad(qid){wrongSet.add(qid);sv(K_WRONG,wrongSet);updateStats();toast('已加入错题本 📕');
  if(document.getElementById('screen-sequential').classList.contains('active')){seq.ng++;updateSeqAcc();}
}

// ============ SEQUENTIAL ============
const CATS=['第1章 填空','第1章 选择','第1章 判断','第2章 填空','第2章 选择','第2章 判断','第3章 填空','第3章 选择','第3章 判断'];
const CAT_ICONS={'第1章 填空':'📝','第1章 选择':'🔤','第1章 判断':'✅','第2章 填空':'📝','第2章 选择':'🔤','第2章 判断':'✅','第3章 填空':'📝','第3章 选择':'🔤','第3章 判断':'✅'};
let seq={cat:CATS[0],idx:0,ok:0,ng:0};

function startSequential(){
  switchScreen('seq-cats');
  seq={cat:CATS[0],idx:0,ok:0,ng:0};
  renderSeqCats();
}

function renderSeqCats(){
  let h='';
  for(const cat of CATS){
    const qs=DB.filter(q=>q.category===cat);
    const total=qs.length;
    h+='<div class="cat-block" onclick="seqEnterCat(\''+cat+'\')">\n      <div class="cb-icon">'+(CAT_ICONS[cat]||'📄')+'</div>\n      <div class="cb-info">\n        <div class="cb-name">'+cat+'</div>\n        <div class="cb-progress">\n          <div class="cb-bar"><div class="cb-fill" style="width:0%"></div></div>\n          <span class="cb-pct">共 '+total+' 题</span>\n        </div>\n      </div>\n    </div>';
  }
  document.getElementById('seq-blocks').innerHTML=h;
}

function seqEnterCat(cat){
  seq.cat=cat;seq.idx=0;seq.ok=0;seq.ng=0;
  switchScreen('sequential');
  document.getElementById('seq-title').textContent='顺序刷题 · '+cat;
  seqRender();
  updateSeqAcc();
}

function seqBackToCats(){
  seq.ok=0;seq.ng=0;
  renderSeqCats();
  switchScreen('seq-cats');
}

function updateSeqAcc(){
  document.getElementById('seq-ok').textContent=seq.ok;
  document.getElementById('seq-ng').textContent=seq.ng;
  const total=seq.ok+seq.ng;
  document.getElementById('seq-rate').textContent=total>0?Math.round(seq.ok/total*100)+'%':'-';
}

function seqRender(){
  const qs=DB.filter(q=>q.category===seq.cat);
  if(!qs.length){document.getElementById('seq-area').innerHTML='<div class="empty-state"><p>暂无题目</p></div>';return}
  const q=qs[seq.idx];
  document.getElementById('seq-area').innerHTML=renderQuiz(q,'seq',false,null);
  document.getElementById('seq-pb').style.width=((seq.idx+1)/qs.length*100)+'%';
  document.getElementById('seq-pt').textContent=(seq.idx+1)+' / '+qs.length;
  document.getElementById('seq-prev').style.display=seq.idx>0?'inline-block':'none';
  document.getElementById('seq-next').textContent=seq.idx<qs.length-1?'下一题 ▶':'✓ 完成';
}

function seqMove(d){
  const qs=DB.filter(q=>q.category===seq.cat);
  const ni=seq.idx+d;
  if(ni<0||ni>=qs.length){seqBackToCats();toast('已完成！');return}
  seq.idx=ni;seqRender();
}

// ============ RANDOM ============
let rand={qs:[],idx:0,total:50,started:false,cats:new Set(CATS)};

function startRandom(){
  switchScreen('random');
  rand={qs:[],idx:0,total:50,started:false,cats:new Set(CATS)};
  randSettingsRender();
  document.getElementById('rand-area').innerHTML='';
  document.getElementById('rand-pb').style.width='0%';
  document.getElementById('rand-pt').textContent='';
  document.getElementById('rand-next').style.display='none';
}

function randSettingsRender(){
  const pool=DB.filter(q=>rand.cats.has(q.category));
  const maxN=Math.max(1,pool.length);
  const val=Math.min(rand.total,maxN);
  document.getElementById('rand-settings').innerHTML='\n    <div class="settings-panel">\n      <label>📂 选择模块（点击切换）</label>\n      <div class="cat-checks">'+CATS.map(c=>'<span class="cat-check'+(rand.cats.has(c)?' active':'')+'" id="rcc-'+c+'" onclick="randToggleCat(\''+c+'\')">'+c+'</span>').join('')+'</div>\n      <div style="font-size:10px;color:var(--text3);margin-bottom:4px"><span id="rcpool">'+pool.length+'</span> 题可选 · <a style="color:var(--accent);cursor:pointer" onclick="randToggleAll()">全选/取消</a></div>\n      <label style="margin-top:10px">🎲 随机抽取数量</label>\n      <input type="number" min="1" max="'+maxN+'" value="'+val+'" id="rcs" class="num-input" onchange="rand.total=parseInt(this.value)||1">\n      <button class="btn btn-primary" onclick="randStart()">开始刷题</button>\n    </div>';
}

function randToggleCat(cat){
  if(rand.cats.has(cat))rand.cats.delete(cat);else rand.cats.add(cat);
  if(rand.cats.size===0){rand.cats.add(cat);return}
  rand.total=Math.min(rand.total,DB.filter(q=>rand.cats.has(q.category)).length);
  randSettingsRender();
}

function randToggleAll(){
  if(rand.cats.size===CATS.length)rand.cats=new Set();
  else rand.cats=new Set(CATS);
  randSettingsRender();
}

function randStart(){
  const n=parseInt(document.getElementById('rcs').value);
  const pool=DB.filter(q=>rand.cats.has(q.category));
  const selected=pool.sort(()=>Math.random()-.5).slice(0,Math.min(n,pool.length));
  rand={qs:selected,idx:0,total:selected.length,started:true,cats:rand.cats};
  document.getElementById('rand-settings').innerHTML='';
  document.getElementById('rand-next').style.display='inline-block';
  randRender();
}
function randRender(){
  const q=rand.qs[rand.idx];
  document.getElementById('rand-area').innerHTML=renderQuiz(q,'random',false,null);
  document.getElementById('rand-pb').style.width=((rand.idx+1)/rand.qs.length*100)+'%';
  document.getElementById('rand-pt').textContent=(rand.idx+1)+' / '+rand.qs.length;
  document.getElementById('rand-next').textContent=rand.idx<rand.qs.length-1?'下一题 ▶':'✓ 完成';
}
function randNext(){
  if(rand.idx>=rand.qs.length-1){goHome();toast('随机刷题完成！');return}
  rand.idx++;randRender();
}

// ============ WRONG BOOK ============
let wb={qs:[],idx:0};

function startWrongBook(){
  switchScreen('wrongbook');
  const ids=[...wrongSet];wb.qs=ids.map(id=>qById(id)).filter(Boolean);
  if(!wb.qs.length){
    document.getElementById('wb-area').innerHTML='<div class="empty-state"><div class="empty-icon">🎉</div><p>错题本为空</p><p style="font-size:11px;color:var(--text3)">做题时错题会自动收录</p></div>';

  wb.idx=0;['wb-prev','wb-next'].forEach(id=>document.getElementById(id).style.display='inline-block');
  wbRender();
}
function wbRender(){
  const q=wb.qs[wb.idx];
  document.getElementById('wb-area').innerHTML=renderQuiz(q,'wrongbook',false,null);
  document.getElementById('wb-pb').style.width=((wb.idx+1)/wb.qs.length*100)+'%';
  document.getElementById('wb-pt').textContent=(wb.idx+1)+' / '+wb.qs.length;
  document.getElementById('wb-prev').style.display=wb.idx>0?'inline-block':'none';
  document.getElementById('wb-next').textContent=wb.idx<wb.qs.length-1?'下一题 ▶':'✓ 完成';
}
function wbMove(d){
  const ni=wb.idx+d;
  if(ni<0||ni>=wb.qs.length){goHome();toast('错题复习完成！');return}
  wb.idx=ni;wbRender();
}

// ============ VIEW MODE ============
let view={cat:CATS[0],idx:0};

function startViewMode(){
  switchScreen('viewmode');
  document.getElementById('view-cats').innerHTML=CATS.map(c=>'<button class="cat-tab'+(c===view.cat?' active':'')+'" onclick="viewCat(\''+c+'\')">'+c+'</button>').join('');
  viewCat(view.cat);
}
function viewCat(cat){
  view={cat,idx:0};
  document.querySelectorAll('#view-cats .cat-tab').forEach(t=>t.classList.toggle('active',t.textContent===cat));
  viewRender();
}
function viewRender(){
  const qs=DB.filter(q=>q.category===view.cat);
  if(!qs.length){document.getElementById('view-area').innerHTML='<div class="empty-state"><p>暂无题目</p></div>';return}
  const q=qs[view.idx];
  document.getElementById('view-area').innerHTML=renderQuiz(q,'view',false,null);
  document.getElementById('view-pb').style.width=((view.idx+1)/qs.length*100)+'%';
  document.getElementById('view-pt').textContent=(view.idx+1)+' / '+qs.length;
  document.getElementById('view-prev').style.display=view.idx>0?'inline-block':'none';
  document.getElementById('view-next').textContent=view.idx<qs.length-1?'下一题 ▶':'✓ 完成';
}
function viewMove(d){
  const qs=DB.filter(q=>q.category===view.cat);
  const ni=view.idx+d;
  if(ni<0||ni>=qs.length){goHome();toast('看题完成！');return}
  view.idx=ni;viewRender();
}

// ============ FAVORITES ============
function showFavorites(){
  switchScreen('favorites');
  renderFav();
}
function renderFav(catFilter){
  const favQs=[...favSet].map(id=>qById(id)).filter(Boolean);
  const cats=[...new Set(favQs.map(q=>q.category))];
  let th='<button class="cat-tab active" onclick="renderFav(null)">全部</button>';
  th+=cats.map(c=>'<button class="cat-tab" onclick="renderFav(\''+c+'\')">'+c+'</button>').join('');
  document.getElementById('fav-cats').innerHTML=th;
  document.querySelectorAll('#fav-cats .cat-tab').forEach(t=>t.classList.toggle('active',catFilter?t.textContent===catFilter:t.textContent==='全部'));
  
  const fq=catFilter?favQs.filter(q=>q.category===catFilter):favQs;
  if(!fq.length){
    document.getElementById('fav-area').innerHTML='<div class="empty-state"><div class="empty-icon">⭐</div><p>暂无收藏</p><p style="font-size:11px;color:var(--text3)">刷题时点亮右上角星标即可收藏</p></div>';
    return;
  }
  let h='';
  for(const q of fq){
    const sf=isFav(q.id)?' active':'';
    h+='<div class="quiz-card">\n      <button class="star-btn'+sf+'" onclick="event.stopPropagation();toggleFav(\''+q.id+'\',this);renderFav()">★</button>\n      <div class="q-header"><span class="q-num">#'+q.id+'</span><span class="q-cat">'+q.category+'</span></div>\n      <div class="q-text" style="font-size:13px;margin-bottom:4px">'+q.question.substring(0,100)+(q.question.length>100?'...':'')+'</div>\n      <div class="answer-box show" style="margin-top:6px"><div class="ans-label">答案</div><div class="ans-text">'+(q.answer||'无').substring(0,100)+'</div></div>\n    </div>';
  }
  document.getElementById('fav-area').innerHTML=h;
}

// ============ INIT ============
updateStats();
</script>
